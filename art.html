        <div id="portfolio-overlay" class="portfolio-overlay">

            <a class="portfolio-overlay-bg"></a>

            <div class="portfolio-overlay-content">

                <div class="portfolio-close">&times;</div>

                <img id="portfolio-overlay-img">

                <h3 id="portfolio-overlay-title"></h3>

                <p id="portfolio-overlay-desc"></p>

            </div>

        </div>


        <script>
        const overlay = document.getElementById("portfolio-overlay");
        const overlayImg = document.getElementById("portfolio-overlay-img");
        const overlayTitle = document.getElementById("portfolio-overlay-title");
        const overlayDesc = document.getElementById("portfolio-overlay-desc");
            
        document.querySelectorAll(".portfolio-gallery-item").forEach(item => {

            item.addEventListener("click", function(e) {

                e.preventDefault();

                overlayImg.src = this.dataset.img;
                overlayTitle.textContent = this.dataset.title;
                overlayDesc.textContent = this.dataset.desc;

                overlay.classList.add("active");

            });

        });


        document.querySelector(".portfolio-close").onclick = () => {
            overlay.classList.remove("active");
        };


        document.querySelector(".portfolio-overlay-bg").onclick = () => {
            overlay.classList.remove("active");
        };
        
        document.addEventListener("keydown", function(event) {

            if (event.key === "Escape") {
                overlay.classList.remove("active");
            }

        });
        </script>
